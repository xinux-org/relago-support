name: Nix Cabal Generate

on:
  pull_request:
    branches: -main
  push:

jobs:
  nix-generate:
    runs-on: ubuntu-latest
    # outputs:
    #   relago-server: ${{ steps.from-cabal-to-nix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - id: from-cabal-to-nix
        name: Generate Nix Cabal
        run: |
          nix run nixpkgs#cabal2nix ./server/. > ./server/relago-server.nix
